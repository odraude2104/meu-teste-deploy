services:
  python-app:
    image: python:3.9-slim
    container_name: python-teste
    working_dir: /app
    volumes:
      - ./app_data:/app
    ports:
      - "5000:5000"
    command: >
      sh -c "apt-get update && apt-get install -y git && 
             git clone https://github.com/odraude2104/meu-teste-deploy.git . || git pull &&
             pip install flask && 
             python app.py"
    restart: unless-stopped
