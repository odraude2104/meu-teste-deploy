services:
  python-app:
    image: python:3.9-slim
    container_name: python-teste
    working_dir: /app
    volumes:
      # Use um caminho fixo que VOCÊ controla no servidor
      - /data/meu-app-python:/app
    ports:
      - "5000:5000"
    command: >
      sh -c "pip install flask && python app.py"
    restart: unless-stopped
